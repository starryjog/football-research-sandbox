<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>赛事列表 | 青训球员追踪站</title>
    <meta
      name="description"
      content="按赛事层级查看亚洲杯、世界杯、世青赛、世少赛的比赛时间、结果、中国战绩与来源链接。"
    />
    <link rel="stylesheet" href="./assets/styles.css?v=20260523-tournament-detail-cache-fix" />
  </head>
  <body data-page="tournaments">
    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="./index.html">
          <span class="brand-kicker" data-i18n="site.kicker">青训追踪台</span>
          <strong data-i18n="site.brand">青训球员追踪站</strong>
        </a>
        <div class="header-actions">
          <nav class="site-nav" aria-label="主导航" data-i18n-aria-label="nav.aria">
            <a data-nav="home" data-i18n="nav.home" href="./index.html">首页</a>
            <a data-nav="players" data-i18n="nav.players" href="./players.html">球员</a>
            <a data-nav="tournaments" data-i18n="nav.tournaments" href="./tournaments.html">赛事</a>
            <a data-nav="overseas" data-i18n="nav.overseas" href="./overseas.html">留洋</a>
          </nav>
          <button id="languageToggleButton" class="header-control" type="button" aria-label="切换语言">
            <span class="header-control-caption" data-i18n="header.language">语言</span>
            <strong id="languageToggleValue">EN</strong>
          </button>
        </div>
      </header>

      <main>
        <section class="page-hero hero-tight">
          <div class="hero-copy">
            <p class="eyebrow" data-i18n="tournaments.hero.eyebrow">Tournament Directory</p>
            <h1 data-i18n="tournaments.hero.title">赛事列表</h1>
            <p class="hero-text" data-i18n="tournaments.hero.text">
              这里汇总 2020 年之后的亚洲杯各年龄段、世界杯、世青赛、世少赛，并单独展开中国战绩与比赛明细。
            </p>
          </div>
          <aside class="hero-spotlight">
            <p class="eyebrow" data-i18n="tournaments.filter.eyebrow">Filter</p>
            <div id="tournamentLevelTabs" class="tab-row"></div>
          </aside>
        </section>

        <section class="content-panel">
          <div class="section-head">
            <div>
              <p class="eyebrow" data-i18n="tournaments.focus.eyebrow">Focus Pool</p>
              <h2 data-i18n="tournaments.focus.title">重点赛事</h2>
            </div>
          </div>
          <div id="focusTournamentGrid" class="story-grid"></div>
        </section>

        <section class="content-panel">
          <div class="section-head">
            <div>
              <p class="eyebrow" data-i18n="tournaments.archive.eyebrow">Archive</p>
              <h2 data-i18n="tournaments.archive.title">赛事档案</h2>
            </div>
            <p id="tournamentArchiveMeta" class="section-note" data-i18n="common.loading">载入中</p>
          </div>
          <div id="tournamentArchiveGrid" class="archive-grid"></div>
          <div id="tournamentArchiveEmptyState" class="empty-state" hidden data-i18n="tournaments.empty">当前标签下没有匹配赛事。</div>
        </section>
      </main>

      <footer class="site-footer">
        <p id="globalUpdatedLabel" data-i18n="common.loadingData">数据载入中</p>
      </footer>
    </div>

    <script type="module" src="./assets/app.js?v=20260523-tournament-detail-cache-fix"></script>
  </body>
</html>
