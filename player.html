<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>球员详情 | 青训球员追踪站</title>
    <meta
      name="description"
      content="查看球员青训路径、赛事经历、当前归属、最近贡献与外部资料链接。"
    />
    <link rel="stylesheet" href="./assets/styles.css?v=20260523-tournament-detail-cache-fix" />
  </head>
  <body data-page="player-detail">
    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="./index.html">
          <span class="brand-kicker" data-i18n="site.kicker">青训追踪台</span>
          <strong data-i18n="site.brand">青训球员追踪站</strong>
        </a>
        <div class="header-actions">
          <nav class="site-nav" aria-label="主导航" data-i18n-aria-label="nav.aria">
            <a data-nav="home" data-i18n="nav.home" href="./index.html">首页</a>
            <a data-nav="players" data-i18n="nav.players" href="./players.html">球员</a>
            <a data-nav="tournaments" data-i18n="nav.tournaments" href="./tournaments.html">赛事</a>
            <a data-nav="overseas" data-i18n="nav.overseas" href="./overseas.html">留洋</a>
          </nav>
          <button id="languageToggleButton" class="header-control" type="button" aria-label="切换语言">
            <span class="header-control-caption" data-i18n="header.language">语言</span>
            <strong id="languageToggleValue">EN</strong>
          </button>
        </div>
      </header>

      <main>
        <p class="breadcrumb">
          <a href="./players.html" data-i18n="playerDetail.breadcrumb.list">球员列表</a>
          <span>/</span>
          <span data-i18n="playerDetail.breadcrumb.detail">球员详情</span>
        </p>

        <section id="playerDetailHero" class="page-hero hero-tight"></section>

        <div id="playerDetailBody" hidden>
          <section class="detail-stats" id="playerDetailStats"></section>

          <section class="content-panel">
            <div class="section-head">
              <div>
                <p class="eyebrow" data-i18n="playerDetail.pathway.eyebrow">Pathway</p>
                <h2 data-i18n="playerDetail.pathway.title">青训路径与归属变化</h2>
              </div>
            </div>
            <div id="playerPathwayTimeline" class="timeline-list"></div>
          </section>

          <section class="dashboard-grid">
            <article id="playerCompetitionSection" class="content-panel panel-span-2">
              <div class="section-head">
                <div>
                  <p class="eyebrow" data-i18n="playerDetail.competition.eyebrow">Competition Log</p>
                  <h2 data-i18n="playerDetail.competition.title">赛事经历</h2>
                </div>
              </div>
              <div id="playerParticipationList" class="stack-list"></div>
            </article>

            <article class="content-panel">
              <div class="section-head">
                <div>
                  <p class="eyebrow" data-i18n="playerDetail.recent.eyebrow">Recent Contributions</p>
                  <h2 data-i18n="playerDetail.recent.title">最近贡献</h2>
                </div>
              </div>
              <div id="playerRecentContributions" class="stack-list"></div>
            </article>
          </section>

          <section id="playerLinksSection" class="content-panel">
            <div class="section-head">
              <div>
                <p class="eyebrow" data-i18n="playerDetail.links.eyebrow">External Links</p>
                <h2 data-i18n="playerDetail.links.title">外部资料与来源</h2>
              </div>
            </div>
            <div id="playerExternalLinks" class="story-grid"></div>
          </section>
        </div>
      </main>

      <footer class="site-footer">
        <p id="globalUpdatedLabel" data-i18n="common.loadingData">数据载入中</p>
      </footer>
    </div>

    <script type="module" src="./assets/app.js?v=20260523-tournament-detail-cache-fix"></script>
  </body>
</html>
